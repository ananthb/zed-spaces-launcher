name: Release

on:
  push:
    tags:
      - "v*"

# Goreleaser drives the binary builds, archives, DMG, and the .app
# bundle. nix-appimage stays as the AppImage source — it's hermetic
# (squashfs + user namespaces) and there's no off-the-shelf
# replacement that runs on any Linux box. The publish job aggregates
# all artifacts, computes SHA256SUMS, cosign-signs everything, and
# uploads the GitHub release.

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install GTK / X11 build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libappindicator3-dev libgl1-mesa-dev pkg-config \
            libx11-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev \
            libxxf86vm-dev libxext-dev libxfixes-dev

      - name: Build hermetic AppImage via nix-appimage
        run: |
          nix build .#packages.x86_64-linux.appimage -o result-appimage
          mkdir -p build
          cp -L result-appimage build/cosmonaut-amd64.AppImage
          chmod +w build/cosmonaut-amd64.AppImage

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --config .goreleaser.linux.yaml

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            build/cosmonaut-amd64.tar.gz
            build/cosmonaut-amd64.AppImage
          if-no-files-found: error

  macos:
    name: macOS
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --config .goreleaser.darwin.yaml

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            build/cosmonaut-macos-arm64.dmg
            build/cosmonaut-macos-arm64.tar.gz
          if-no-files-found: error

  release:
    name: Create Release
    needs: [linux, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: sigstore/cosign-installer@v3

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums and sign
        working-directory: artifacts
        run: |
          sha256sum $(ls -1 | grep -v '\.sig$\|\.pem$\|SHA256SUMS') > SHA256SUMS
          for f in *; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
