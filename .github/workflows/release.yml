name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            arch: amd64
          - system: aarch64-linux
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup QEMU for aarch64
        if: matrix.system == 'aarch64-linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static

      - name: Configure Nix for aarch64 cross-compilation
        if: matrix.system == 'aarch64-linux'
        run: |
          echo "extra-platforms = aarch64-linux" | sudo tee -a /etc/nix/nix.conf
          sudo systemctl restart nix-daemon

      - name: Build release tarball
        run: |
          nix build .#packages.${{ matrix.system }}.release -o result-release
          cp "$(readlink result-release)" dist-codespace-zed-${{ matrix.arch }}.tar.gz

      - name: Build AppImage
        run: |
          nix build .#packages.${{ matrix.system }}.appimage -o result-appimage
          cp "$(readlink result-appimage)" dist-codespace-zed-${{ matrix.arch }}.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist-*

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build DMG
        run: |
          nix build .#release -o result-dmg
          cp "$(readlink result-dmg)" dist-codespace-zed-macos-arm64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist-*

  release:
    name: Create Release
    needs: [linux, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: sigstore/cosign-installer@v3

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Rename artifacts
        run: |
          cd artifacts
          for f in dist-*; do
            mv "$f" "${f#dist-}"
          done

      - name: Generate checksums and sign
        run: |
          cd artifacts
          sha256sum $(ls -1 | grep -v '\.sig$\|\.pem$\|SHA256SUMS') > SHA256SUMS
          for f in *; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
