<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1c22"/>
      <stop offset="100%" stop-color="#0a0b0e"/>
    </linearGradient>
    <linearGradient id="visor" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#14161b"/>
      <stop offset="100%" stop-color="#1e2028"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.35">
      <stop offset="0%" stop-color="#a3e635" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Icon background -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!-- Visor shape — large rounded rectangle filling most of the icon -->
  <rect x="120" y="240" width="784" height="480" rx="80" fill="url(#visor)"
        stroke="#2a2c32" stroke-width="4"/>

  <!-- Subtle glow behind cursor -->
  <rect x="120" y="240" width="784" height="480" rx="80" fill="url(#glow)"/>

  <!-- Cursor block — lime, centered -->
  <rect x="432" y="380" width="160" height="200" rx="16" fill="#a3e635"/>

  <!-- Visor reflection / gloss -->
  <rect x="120" y="240" width="784" height="240" rx="80" fill="url(#gloss)"/>

  <!-- Visor border highlight top -->
  <path d="M 200 240 L 824 240" stroke="#3f3f46" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
