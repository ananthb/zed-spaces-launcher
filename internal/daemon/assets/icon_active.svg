<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="44" height="44">
  <!-- Cosmonaut active: CA monogram — C wraps around A-rocket, dots filled -->
  <!-- A as rocket -->
  <path d="M22 6 L28 32 L24 32 L22 24 L20 32 L16 32 Z" fill="none" stroke="#000000" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- A crossbar -->
  <line x1="18.5" y1="26" x2="25.5" y2="26" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
  <!-- Rocket fins -->
  <path d="M16 32 L13 36 L17 33" fill="none" stroke="#000000" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M28 32 L31 36 L27 33" fill="none" stroke="#000000" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- C wrapping around the A -->
  <path d="M14 12 Q6 12,6 22 Q6 32,14 34" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
  <!-- Connection dots (filled for active) -->
  <circle cx="38" cy="14" r="2.5" fill="#000000"/>
  <circle cx="38" cy="22" r="2.5" fill="#000000"/>
</svg>
